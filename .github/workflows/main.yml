name: USC-PIS CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: uscpis_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libcairo2-dev pkg-config python3-dev \
          libpangocairo-1.0-0 libpango-1.0-0 libgdk-pixbuf2.0-0 \
          shared-mime-info libffi-dev

    - name: Install Backend Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install psycopg2-binary xhtml2pdf

    - name: Run Advanced Unit Tests (UT-01 to UT-04)
      env:
        DATABASE_URL: postgres://postgres:postgres_password@localhost:5432/uscpis_db
        PGP_ENCRYPTION_KEY: ${{ secrets.PGP_ENCRYPTION_KEY }}
        SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
      run: |
        cd backend
        python manage.py test tests_unit_v2

    - name: Run Integration Tests (IT-01 to IT-03)
      env:
        DATABASE_URL: postgres://postgres:postgres_password@localhost:5432/uscpis_db
        PGP_ENCRYPTION_KEY: ${{ secrets.PGP_ENCRYPTION_KEY }}
        SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
      run: |
        cd backend
        python manage.py test tests_integration_v2

    - name: Run Performance Benchmarks (PT-01 to PT-03)
      env:
        DATABASE_URL: postgres://postgres:postgres_password@localhost:5432/uscpis_db
        PGP_ENCRYPTION_KEY: ${{ secrets.PGP_ENCRYPTION_KEY }}
        SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
      run: |
        cd backend
        python manage.py test tests_performance_v2

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
    - uses: actions/checkout@v4
    - name: Deploy to Heroku
      uses: akhileshns/heroku-deploy@v3.13.15
      with:
        heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
        heroku_app_name: "usc-pis"
        heroku_email: "sgalenelijah@gmail.com"
        usedocker: false
